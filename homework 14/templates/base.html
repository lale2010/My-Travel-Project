<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTravel AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <span class="logo">✈️ SmartTravel</span>
            <div class="nav-links">
                <a href="/" class="nav-item">News</a>
                <a href="/quiz" class="nav-item">Trip Quiz</a>
                <a href="/calculator" class="nav-item">Budget</a>
                <a href="{{ url_for('history') }}" class="nav-item {% if request.path.startswith('/history') %}active{% endif %}">  
                    Budget History  
                 </a>
                 {% if not current_user.is_authenticated %}
        <a href="{{ url_for('login') }}" class="nav-item">Login</a>
        <a href="{{ url_for('register') }}" class="nav-item">Register</a>
    {% else %}
        <a href="{{ url_for('logout') }}" class="nav-item">Logout</a>
    {% endif %}
</div>
            </div>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
